media:
  input: public/media
  output: /media

content:
  - name: blog
    label: Blog
    path: src/content/blog
    filename: "{year}-{month}-{day}-{fields.title}.mdx"
    type: collection
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Publication Date
        type: date
        options:
          format: MM/dd/yyyy
      - name: heroImage
        label: Hero Image
        type: image
      - name: heroImagePrompt
        label: Hero Image Prompt
        type: text
        description: The AI prompt used to generate the hero image (shown as a tooltip)
      - name: body
        label: Body
        type: text
    view:
      fields: [heroImage, title, pubDate]
      primary: title
      sort: [pubDate, title]
      default:
        sort: pubDate
        order: desc
